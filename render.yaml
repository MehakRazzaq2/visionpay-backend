services:
  - type: web
    name: visionpay-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PATH
        value: visionpay_combined_best.pt
      - key: DB_PATH
        value: /tmp/visionpay.db
    autoDeploy: false
